# /etc/nginx/sites-available/rejestracja.icpemission.pl
# Front (statyczny build Vite) w "/", API (NestJS) w "/api".
# Po `certbot --nginx` blok 443 + przekierowanie 80→443 dopisze się automatycznie.

server {
    listen 80;
    listen [::]:80;
    server_name rejestracja.icpemission.pl;

    # Statyczny build frontendu
    root /var/www/icpe/app/dist;
    index index.html;

    # Kompresja
    gzip on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml application/font-woff2;

    # API → NestJS na 127.0.0.1:3000 (global prefix "api" zachowany)
    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Cache zasobów z hashem w nazwie
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback (React Router – BrowserRouter)
    location / {
        try_files $uri $uri/ /index.html;
    }

    client_max_body_size 10m;
}

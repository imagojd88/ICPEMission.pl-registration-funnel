# Render Blueprint — backend ICPE + baza PostgreSQL.
# W Render: New ▸ Blueprint ▸ wskaż to repo. Wartości ADMIN_* uzupełnisz w panelu.
databases:
  - name: icpe-db
    databaseName: icpe
    user: icpe
    plan: free          # uwaga: darmowa baza Render wygasa po ~30 dniach — później zmień na płatną

services:
  - type: web
    name: icpe-api
    runtime: node
    plan: free          # darmowy web usypia po bezczynności; do produkcji zmień na płatny
    rootDir: .
    buildCommand: npm install && npm --workspace=api run build
    startCommand: cd api && npx prisma db push --skip-generate && node dist/main.js
    healthCheckPath: /docs
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: icpe-db
          property: connectionString
      - key: NODE_VERSION
        value: "20"
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: SERVICE_TOKEN          # token dla Personal OS — odczytasz go z panelu Render
        generateValue: true
      - key: ADMIN_EMAIL            # login do panelu admina — ustaw w panelu Render
        sync: false
      - key: ADMIN_PASSWORD         # hasło do panelu admina — ustaw w panelu Render
        sync: false
      - key: CORS_ORIGIN
        value: https://rejestracja.icpemission.pl
      - key: PAYMENTS_MODE
        value: mock
      # Mail: ustaw w panelu Render (Blueprint nie nadpisuje — sync:false).
      # MAIL_MODE=smtp + dane SMTP, żeby maile faktycznie wychodziły (domyślnie tylko log).
      - key: MAIL_MODE          # 'log' (domyślnie) albo 'smtp'
        sync: false
      - key: MAIL_FROM          # np. "ICPE Mission <rejestracja@icpemission.pl>"
        sync: false
      - key: SMTP_HOST          # np. smtp.poczta-domeny.pl
        sync: false
      - key: SMTP_PORT          # 587 (STARTTLS) lub 465 (SSL)
        sync: false
      - key: SMTP_SECURE        # 'true' dla portu 465, w innym wypadku 'false'
        sync: false
      - key: SMTP_USER          # login skrzynki
        sync: false
      - key: SMTP_PASS          # hasło skrzynki
        sync: false
      # CMS strony ICPE Mission PL — Deploy Hook static-site'u Astro.
      # Skopiuj z panelu Render (Static Site ▸ Settings ▸ Deploy Hook). Gdy pusty,
      # publikacja treści tylko loguje zdarzenie (bez rebuildu). Blueprint nie nadpisuje.
      - key: SITE_DEPLOY_HOOK_URL
        sync: false

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: icpe
      POSTGRES_PASSWORD: icpe
      POSTGRES_DB: icpe
    ports:
      - "5432:5432"
    volumes:
      - dbdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  dbdata:
